<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-1">
        <h1 id="app-title">Study Guide</h1>
        <p id="app-subtitle">What do you want to study first?</p>
        <button class="main-btn" onclick="openStudyMode('world_geography', 'World Geography')">World Geography</button>
    </div>

    <div id="screen-2">
        <div class="terminal-header">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <div id="mode-title">Study Mode initialized...</div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="study-input" placeholder="Type your answer here... and press Enter" autocomplete="off">
        </div>
    </div>

    <script src="study.js"></script>
</body>
</html>
